spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5
  jpa:
    show-sql: false
    open-in-view: false



r2:
  access-key-id: ${R2_ACCESS_KEY_ID}
  secret-access-key: ${R2_SECRET_ACCESS_KEY}
  endpoint: https://0a0aef52d81c40637c43447fa3c6d4f8.r2.cloudflarestorage.com
  bucket-name: qrcodepro
  public-url: ${R2_PUBLIC_URL}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

qr:
  default-size: 300
  max-size: 2000
  default-correction-level: H
  base-url: ${QR_BASE_URL}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.qrpro: INFO
    org.springframework.security: WARN
    org.hibernate: WARN

server:
  port: ${PORT:8080}
  shutdown: graceful
