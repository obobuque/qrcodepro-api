version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: qrpro-postgres
    environment:
      POSTGRES_DB: qrpro
      POSTGRES_USER: qrpro
      POSTGRES_PASSWORD: qrpro_secret_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - qrpro-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrpro -d qrpro"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qrpro-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - qrpro-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: qrpro-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - qrpro-network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qrpro-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/qrpro
      SPRING_DATASOURCE_USERNAME: qrpro
      SPRING_DATASOURCE_PASSWORD: qrpro_secret_123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: qrcodes
      JWT_SECRET: qrprodevsecretkeymuitolongaeseguraparadesenvolvimentolocal123456789
      JWT_EXPIRATION: 86400000
      QR_BASE_URL: http://localhost/r/
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - qrpro-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: qrpro-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - qrpro-network

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  qrpro-network:
    driver: bridge
